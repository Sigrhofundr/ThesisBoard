<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposte di Tesi - Dashboard Interattiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color:     #0f172a;
            --surface:      #1e293b;
            --surface-hover:#334155;
            --primary:      #3b82f6;
            --primary-hover:#2563eb;
            --text-main:    #f8fafc;
            --text-muted:   #94a3b8;
            --border-color: #334155;
            --radius:       12px;
            --glass-bg:     rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255,255,255,0.1);
        }
        [data-theme="light"] {
            --bg-color:     #f8fafc;
            --surface:      #ffffff;
            --surface-hover:#f1f5f9;
            --primary:      #2563eb;
            --primary-hover:#1d4ed8;
            --text-main:    #0f172a;
            --text-muted:   #64748b;
            --border-color: #e2e8f0;
            --glass-bg:     rgba(255,255,255,0.9);
            --glass-border: rgba(0,0,0,0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background:var(--bg-color); color:var(--text-main); line-height:1.6; min-height:100vh; overflow-x:hidden; transition:background-color 0.3s ease; }

        .bg-pattern {
            position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-1;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59,130,246,0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(147,51,234,0.15), transparent 25%);
            filter:blur(40px);
        }

        header {
            padding:1.2rem 5%; border-bottom:1px solid var(--border-color);
            background:var(--glass-bg); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            position:sticky; top:0; z-index:200;
            display:flex; justify-content:space-between; align-items:center;
        }
        h1 {
            font-size:1.6rem; font-weight:700;
            background:linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
        }
        .theme-toggle {
            background:var(--surface); border:1px solid var(--border-color); color:var(--text-main);
            padding:0.45rem 1rem; border-radius:20px; cursor:pointer; font-weight:500; transition:all 0.2s;
        }
        .theme-toggle:hover { background:var(--surface-hover); transform:translateY(-1px); }
        .header-actions { display:flex; align-items:center; gap:0.55rem; }
        .portal-link {
            display:inline-flex; align-items:center;
            background:var(--primary); color:#fff;
            border:1px solid var(--primary);
            padding:0.45rem 0.95rem;
            border-radius:20px;
            font-size:0.86rem;
            font-weight:600;
            text-decoration:none;
            transition:all 0.2s;
        }
        .portal-link:hover { background:var(--primary-hover); border-color:var(--primary-hover); transform:translateY(-1px); }

        .container { max-width:1400px; margin:2rem auto; padding:0 5%; }

        /* ── Filters ─────────────────────────────────────────── */
        .filters {
            background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius);
            padding:1.25rem; margin-bottom:1.5rem;
            display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:0.9rem;
            box-shadow:0 8px 24px rgba(0,0,0,0.15);
        }
        .filter-group { display:flex; flex-direction:column; gap:0.35rem; }
        .filter-group label { font-size:0.78rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
        input, select {
            width:100%; padding:0.6rem 0.85rem; border-radius:8px; border:1px solid var(--border-color);
            background:var(--bg-color); color:var(--text-main); outline:none; transition:all 0.2s; font-size:0.9rem;
        }
        input:focus, select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(59,130,246,0.2); }

        .checkbox-row { display:flex; gap:1.5rem; align-items:center; flex-wrap:wrap; padding:0.4rem 0; }
        .checkbox-group { display:flex; align-items:center; gap:0.45rem; cursor:pointer; font-size:0.9rem; }
        .checkbox-group input { width:auto; cursor:pointer; accent-color:var(--primary); transform:scale(1.2); }

        /* ── Stats ───────────────────────────────────────────── */
        .stats { margin-bottom:1rem; font-size:0.9rem; color:var(--text-muted); }

        .section-title {
            margin:1.2rem 0 0.8rem;
            font-size:0.95rem;
            text-transform:uppercase;
            letter-spacing:0.7px;
            color:var(--text-muted);
            font-weight:700;
        }

        .favorites-section { margin-bottom:1.4rem; }
        .favorites-section.hidden { display:none; }

        /* ── Grid ────────────────────────────────────────────── */
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:1.4rem; }

        /* ── Card ────────────────────────────────────────────── */
        .card {
            background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius);
            padding:1.4rem; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
            display:flex; flex-direction:column; gap:0.9rem;
            position:relative; overflow:hidden; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);
            cursor:pointer;
            animation:fadeIn 0.4s ease-out forwards;
        }
        .card:hover { transform:translateY(-4px); box-shadow:0 20px 25px -5px rgba(0,0,0,0.25); border-color:var(--primary); }
        .card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--primary); opacity:0; transition:opacity 0.3s; }
        .card:hover::before { opacity:1; }
        .card.expired { opacity:0.6; filter:saturate(0.5); }
        .card.expired:hover { opacity:0.9; filter:saturate(0.8); }

        .card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:0.8rem; }
        .card-title { font-size:1rem; font-weight:600; color:var(--text-main); line-height:1.4; }

        /* ── Badges ──────────────────────────────────────────── */
        .badges-top { display:flex; gap:0.4rem; flex-shrink:0; flex-wrap:wrap; }
        .badge { padding:0.2rem 0.55rem; border-radius:20px; font-size:0.7rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; white-space:nowrap; }
        .badge-azienda { background:rgba(16,185,129,0.15); color:#34d399; border:1px solid rgba(16,185,129,0.3); }
        .badge-estero  { background:rgba(245,158,11,0.15);  color:#fbbf24; border:1px solid rgba(245,158,11,0.3); }
        .badge-scaduta { background:rgba(239,68,68,0.15);   color:#f87171; border:1px solid rgba(239,68,68,0.3); }
        .badge-new     { background:rgba(34,197,94,0.2);    color:#4ade80; border:1px solid rgba(34,197,94,0.4); }
        .badge-updated { background:rgba(168,85,247,0.2);   color:#c084fc; border:1px solid rgba(168,85,247,0.4); }
        .badge-allegati { background:rgba(59,130,246,0.15); color:#93c5fd; border:1px solid rgba(59,130,246,0.35); }
        [data-theme="light"] .badge-azienda { color:#059669; }
        [data-theme="light"] .badge-estero  { color:#d97706; }
        [data-theme="light"] .badge-scaduta { color:#dc2626; }
        [data-theme="light"] .badge-new     { color:#16a34a; }
        [data-theme="light"] .badge-updated { color:#7c3aed; }
        [data-theme="light"] .badge-allegati { color:#1d4ed8; }

        .attachment-indicator {
            display:inline-flex; align-items:center; justify-content:center;
            margin-left:0.35rem;
            color:var(--primary);
            font-size:0.95rem;
            vertical-align:top;
        }

        .attachment-hint {
            display:inline-flex; align-items:center; gap:0.4rem;
            margin-top:0.2rem;
            font-size:0.78rem;
            color:var(--text-muted);
        }

        .attachments-list {
            list-style:none;
            display:flex;
            flex-direction:column;
            gap:0.5rem;
        }

        .attachment-link {
            color:var(--primary);
            text-decoration:none;
            font-weight:600;
            word-break:break-word;
        }
        .attachment-link:hover { text-decoration:underline; }

        .fav-btn {
            width:1.9rem; height:1.9rem;
            border-radius:50%; border:1px solid var(--border-color);
            background:var(--surface-hover); color:var(--text-muted);
            cursor:pointer; font-size:1rem; line-height:1;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.2s ease;
            flex-shrink:0;
        }
        .fav-btn:hover { border-color:var(--primary); color:var(--primary); transform:translateY(-1px); }
        .fav-btn.active {
            background:rgba(245,158,11,0.15);
            border-color:rgba(245,158,11,0.5);
            color:#f59e0b;
        }

        /* ── Relatori ─────────────────────────────────────────── */
        .relatori { background:var(--bg-color); border-radius:8px; padding:0.9rem; border:1px solid var(--border-color); }
        .relatori-title { font-size:0.75rem; color:var(--text-muted); margin-bottom:0.4rem; text-transform:uppercase; font-weight:600; }
        .relatori-list { list-style:none; display:flex; flex-direction:column; gap:0.25rem; }
        .relatore-item { display:flex; align-items:center; gap:0.45rem; font-size:0.9rem; font-weight:500; }
        .relatore-item::before { content:'•'; color:var(--primary); font-size:1.1rem; }
        .relatore-link { color:var(--primary); text-decoration:none; font-weight:600; }
        .relatore-link:hover { text-decoration:underline; }
        .detail-warning {
            margin-top:0.7rem;
            font-size:0.78rem;
            color:var(--text-muted);
            line-height:1.45;
        }

        /* ── Keywords ─────────────────────────────────────────── */
        .keywords { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:auto; }
        .keyword {
            background:rgba(59,130,246,0.1); color:#60a5fa;
            padding:0.25rem 0.7rem; border-radius:6px; font-size:0.75rem; font-weight:500;
            border:1px solid rgba(59,130,246,0.2);
        }
        [data-theme="light"] .keyword { background:rgba(37,99,235,0.08); color:var(--primary); }

        /* ── No results ───────────────────────────────────────── */
        .no-results {
            text-align:center; padding:4rem; color:var(--text-muted); grid-column:1/-1;
            font-size:1.05rem; background:var(--surface); border-radius:var(--radius);
            border:1px dashed var(--border-color);
        }

        /* ── Modal ────────────────────────────────────────────── */
        .modal-overlay {
            position:fixed; inset:0;
            background:rgba(0,0,0,0.6); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
            z-index:500; display:none; justify-content:center; align-items:center; padding:1rem;
            opacity:0; transition:opacity 0.25s ease;
        }
        .modal-overlay.active { display:flex; }
        .modal-overlay.visible { opacity:1; }

        .modal {
            background:var(--surface); border:1px solid var(--border-color); border-radius:var(--radius);
            width:100%; max-width:820px; max-height:90vh; overflow-y:auto;
            position:relative; box-shadow:0 30px 60px rgba(0,0,0,0.5);
            transform:scale(0.95) translateY(16px);
            transition:transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.visible .modal { transform:scale(1) translateY(0); }

        .modal-header {
            padding:1.5rem 1.5rem 1rem;
            border-bottom:1px solid var(--border-color);
            position:sticky; top:0;
            background:var(--glass-bg); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            z-index:10;
        }
        .modal-close {
            position:absolute; top:1.1rem; right:1.1rem;
            background:var(--surface-hover); border:1px solid var(--border-color); color:var(--text-main);
            width:2rem; height:2rem; border-radius:50%; font-size:1.1rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.2s; z-index:20;
        }
        .modal-close:hover { background:var(--primary); border-color:var(--primary); color:#fff; transform:rotate(90deg); }
        .modal-title { font-size:1.3rem; font-weight:700; color:var(--text-main); padding-right:2.5rem; line-height:1.4; margin-bottom:0.5rem; }

        .modal-link {
            display:inline-block; margin-top:0.8rem; padding:0.45rem 1rem;
            background:var(--primary); color:#fff; border-radius:6px;
            text-decoration:none; font-size:0.82rem; font-weight:600;
            transition:background 0.2s;
        }
        .modal-link:hover { background:var(--primary-hover); }

        .modal-body { padding:1.5rem; display:flex; flex-direction:column; gap:1.25rem; }

        .detail-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:1rem; }
        .detail-section { background:var(--bg-color); border-radius:8px; border:1px solid var(--border-color); padding:1.1rem; }
        .detail-title { font-size:0.78rem; color:var(--text-muted); text-transform:uppercase; font-weight:700; margin-bottom:0.6rem; letter-spacing:0.5px; }
        .detail-content { font-size:0.92rem; color:var(--text-main); white-space:pre-line; line-height:1.7; }
        .detail-label { font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; font-weight:600; }
        .detail-value { font-size:0.92rem; font-weight:500; margin-top:0.2rem; }

        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <header>
        <h1>🎓 Thesis Hub</h1>
        <div class="header-actions">
            <a
                class="portal-link"
                href="https://didattica.polito.it/pls/portal30/sviluppo.pagine_studenti.tesi_proposte_cds"
                target="_blank"
                rel="noopener"
                id="portalLink"
                data-i18n="portalLink"
            >Apri lista ufficiale tesi</a>
            <button class="theme-toggle" onclick="toggleLang()" id="langBtn">🌐 English</button>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🔆 Light Mode</button>
        </div>
    </header>

    <main class="container">
        <div class="filters">
            <div class="filter-group">
                <label for="searchTitle" data-i18n="labelTitolo">Titolo</label>
                <input type="text" id="searchTitle" data-i18n-placeholder="phTitolo" placeholder="Cerca nel titolo…">
            </div>

            <div class="filter-group">
                <label for="searchRelatore" data-i18n="labelRelatore">Relatore</label>
                <input type="text" id="searchRelatore" data-i18n-placeholder="phRelatore" placeholder="Nome relatore…">
            </div>

            <div class="filter-group">
                <label for="searchKeyword" data-i18n="labelKeyword">Parola chiave</label>
                <input type="text" id="searchKeyword" data-i18n-placeholder="phKeyword" placeholder="Cerca nelle keyword…">
            </div>

            <div class="filter-group">
                <label for="filterTipo" data-i18n="labelTipo">Tipo di tesi</label>
                <select id="filterTipo">
                    <option value="" data-i18n="optTipoAll">Tutti i tipi</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterGruppo" data-i18n="labelGruppo">Gruppo di ricerca</label>
                <select id="filterGruppo">
                    <option value="" data-i18n="optGruppoAll">Tutti i gruppi</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterScadenza" data-i18n="labelScadenza">Scadenza</label>
                <select id="filterScadenza">
                    <option value="active" data-i18n="optScadActive">Solo attive</option>
                    <option value="all"    data-i18n="optScadAll">Tutte</option>
                    <option value="expired" data-i18n="optScadExp">Solo scadute</option>
                </select>
            </div>

            <div class="filter-group" style="grid-column:1/-1;">
                <label style="margin-bottom:0.3rem;" data-i18n="labelSpeciale">Tipo speciale</label>
                <div class="checkbox-row">
                    <label class="checkbox-group">
                        <input type="checkbox" id="filterAzienda"> <span data-i18n="chkAzienda">Solo tesi in Azienda</span>
                    </label>
                    <label class="checkbox-group">
                        <input type="checkbox" id="filterEstero"> <span data-i18n="chkEstero">Solo tesi all'Estero</span>
                    </label>
                    <label class="checkbox-group">
                        <input type="checkbox" id="filterPreferiti"> <span data-i18n="chkPreferiti">Solo preferite</span>
                    </label>
                    <label class="checkbox-group">
                        <input type="checkbox" id="filterNew"> <span class="badge badge-new" style="font-size:0.65rem;">NEW</span>&nbsp;<span data-i18n="chkNew">Solo nuove</span>
                    </label>
                    <label class="checkbox-group">
                        <input type="checkbox" id="filterUpdated"> <span class="badge badge-updated" style="font-size:0.65rem;">UPDATED</span>&nbsp;<span data-i18n="chkUpdated">Solo aggiornate</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="stats" id="statsCounter">Caricamento tesi…</div>

        <section class="favorites-section hidden" id="favoritesSection">
            <h2 class="section-title" data-i18n="sectionFavs">Preferite</h2>
            <div class="grid" id="favoritesGrid"></div>
        </section>

        <h2 class="section-title" data-i18n="sectionAll">Tutte le tesi</h2>
        <div class="grid" id="tesiGrid"></div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalBox">
            <button class="modal-close" id="modalCloseBtn" title="Close">✕</button>
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="badges-top" id="modalBadges"></div>
                <a href="#" id="modalLink" class="modal-link" target="_blank" rel="noopener" data-i18n="modalPortalLink">Apri sul Portale della Didattica ↗</a>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
    // ── Theme ──────────────────────────────────────────────────
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeBtn').textContent = isDark ? tr('themeDark') : tr('themeLight');
    }

    // ── i18n ────────────────────────────────────────────────────

        it: {
            portalLink:      'Apri lista ufficiale tesi',

            optScadActive:   'Solo attive',

            optScadExp:      'Solo scadute',
            chkAzienda:      'Solo tesi in Azienda',
            chkEstero:       "Solo tesi all'Estero",
            chkPreferiti:    'Solo preferite',

            noResults:       'Nessuna tesi trovata con i filtri correnti.',

            noData:          'Errore: dati non trovati. Esegui update_tesi.py per generare data.js.',

            detKeywords:     'Parole chiave',
            favAdd:          'Aggiungi ai preferiti',

        },
        en: {

            phTitolo:        'Search in title…',
            phRelatore:      'Supervisor name…',
            phKeyword:       'Search keywords…',
            optTipoAll:      'All types',
            optGruppoAll:    'All groups',
            optScadActive:   'Active only',
            optScadAll:      'All',
            optScadExp:      'Expired only',
            chkAzienda:      'Company theses only',
            chkEstero:       'Abroad theses only',
            chkPreferiti:    'Favourites only',
            chkNew:          'New only',
            chkUpdated:      'Updated only',
            sectionFavs:     'Favourites',
            sectionAll:      'All theses',
            modalPortalLink: 'Open on the Teaching Portal ↗',
            statsLoading:    'Loading theses…',
            statsResults:    (n, tot, favs) => `Results: ${n} of ${tot} theses. Favourites: ${favs}.`,
            statsFavs:       (n, tot, all) => `Results: ${n} favourites of ${tot} filtered theses (${all} total).`,
            noResults:       'No theses found with the current filters.',
            noFavs:          'No favourite theses found with the current filters.',
            noData:          'Error: data not found. Run update_tesi.py to generate data.js.',
            relatori:        'Supervisors',
            tipo:            'Type:',
            noRelatore:      'No supervisor listed',
            detTipo:         'Thesis type',
            detScadenza:     'Deadline',
            detRelatori:     'Supervisors',
            detDescrizione:  'Description',
            detCompetenze:   'Required skills / knowledge',
            detGruppi:       'Research groups',
            detRiferimenti:  'See also',
            detKeywords:     'Keywords',
            favAdd:          'Add to favourites',
            favRemove:       'Remove from favourites',
        },
    };

    let currentLang = localStorage.getItem('thesisLang') || 'it';

    function tr(key) {
        return (TRANSLATIONS[currentLang] || TRANSLATIONS.it)[key] || key;
    }

    function applyLang() {
        // Static text nodes
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            const val = tr(key);
            if (typeof val === 'string') el.textContent = val;
        });
        // Placeholders
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            el.placeholder = tr(el.getAttribute('data-i18n-placeholder'));
        });
        // Lang button (shows the OTHER language you can switch to)
        const langBtn = document.getElementById('langBtn');
        if (langBtn) langBtn.textContent = tr('langBtn');
        // Theme button label
        const themeBtn = document.getElementById('themeBtn');
        if (themeBtn) {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            themeBtn.textContent = isDark ? tr('themeDark') : tr('themeLight');
        }
        // Stats counter
        if (statsCounter) statsCounter.textContent = tr('statsLoading');
        // html lang attribute
        document.documentElement.lang = currentLang;
    }

    function toggleLang() {
        currentLang = currentLang === 'it' ? 'en' : 'it';
        localStorage.setItem('thesisLang', currentLang);
        applyLang();
        renderGrid();   // re-render cards/modal so dynamic strings update
    }



    // ── Elements ───────────────────────────────────────────────
    const grid         = document.getElementById('tesiGrid');
    const favoritesGrid= document.getElementById('favoritesGrid');
    const favoritesSection = document.getElementById('favoritesSection');
    const statsCounter = document.getElementById('statsCounter');
    const fTitle       = document.getElementById('searchTitle');
    const fRelatore    = document.getElementById('searchRelatore');
    const fKeyword     = document.getElementById('searchKeyword');
    const fTipo        = document.getElementById('filterTipo');
    const fGruppo      = document.getElementById('filterGruppo');
    const fScadenza    = document.getElementById('filterScadenza');
    const fAzienda     = document.getElementById('filterAzienda');
    const fEstero      = document.getElementById('filterEstero');
    const fPreferiti   = document.getElementById('filterPreferiti');
    const fNew         = document.getElementById('filterNew');
    const fUpdated     = document.getElementById('filterUpdated');

    const modalOverlay = document.getElementById('modalOverlay');
    const modalBox     = document.getElementById('modalBox');
    const modalCloseBtn= document.getElementById('modalCloseBtn');
    const modalTitle   = document.getElementById('modalTitle');
    const modalBadges  = document.getElementById('modalBadges');
    const modalBody    = document.getElementById('modalBody');
    const modalLink    = document.getElementById('modalLink');
    const FAV_STORAGE_KEY = 'tesiFavoritesV1';

    let normalizedData = [];
    let favorites = new Set();

    function getFavId(t) {
        return String(t.pid || t.link_polito || t.titolo || '');
    }

    function loadFavorites() {
        try {
            const raw = localStorage.getItem(FAV_STORAGE_KEY);
            if (!raw) return;
            const arr = JSON.parse(raw);
            if (Array.isArray(arr)) {
                favorites = new Set(arr.map(v => String(v)));
            }
        } catch (_) {
            favorites = new Set();
        }
    }

    function saveFavorites() {
        localStorage.setItem(FAV_STORAGE_KEY, JSON.stringify([...favorites]));
    }

    function isFavorite(t) {
        return favorites.has(getFavId(t));
    }

    function toggleFavorite(t) {
        const id = getFavId(t);
        if (!id) return;
        if (favorites.has(id)) {
            favorites.delete(id);
        } else {
            favorites.add(id);
        }
        saveFavorites();
    }

    function parseDateLoose(value) {
        if (!value) return null;
        const raw = String(value).trim();
        const matchIt = raw.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        if (matchIt) {
            const d = new Date(`${matchIt[3]}-${matchIt[2]}-${matchIt[1]}T00:00:00`);
            if (!Number.isNaN(d.getTime())) return d;
        }
        const matchIso = raw.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (matchIso) {
            const d = new Date(`${matchIso[1]}-${matchIso[2]}-${matchIso[3]}T00:00:00`);
            if (!Number.isNaN(d.getTime())) return d;
        }
        return null;
    }

    function toArray(value) {
        if (Array.isArray(value)) {
            return value.map(v => String(v).trim()).filter(Boolean);
        }
        if (typeof value === 'string') {
            return value
                .split(/\n+|\s{2,}|[;,]/)
                .map(v => v.trim())
                .filter(Boolean);
        }
        return [];
    }

    function normalizeRecord(t, idx) {
        const rec = t || {};
        const titolo = String(rec.titolo || '').trim();
        const relatori = toArray(rec.relatori);
        const gruppi = toArray(rec.gruppi_ricerca);
        const keywords = toArray(rec.keywords);
        const allegati = Array.isArray(rec.allegati)
            ? rec.allegati
                .map(a => {
                    const entry = a && typeof a === 'object' ? a : {};
                    const label = String(entry.label || '').trim();
                    const url = String(entry.url || '').trim();
                    if (!url) return null;
                    return { label: label || url, url };
                })
                .filter(Boolean)
            : [];
        const tipo = String(rec.tipo_tesi || '').trim();
        const scadenza = String(rec.scadenza || '').trim();
        const parsedDate = parseDateLoose(scadenza);
        const hasScaduta = typeof rec.scaduta === 'boolean';
        const scaduta = hasScaduta
            ? rec.scaduta
            : (parsedDate ? parsedDate < new Date(new Date().toDateString()) : false);

        return {
            pid: rec.pid || String(idx + 1),
            titolo,
            relatori,
            parole_chiave_raw: toArray(rec.parole_chiave_raw),
            keywords,
            tipo_tesi: tipo,
            azienda: Boolean(rec.azienda),
            estero: Boolean(rec.estero),
            scadenza,
            scaduta,
            descrizione: String(rec.descrizione || ''),
            competenze_richieste: String(rec.competenze_richieste || ''),
            gruppi_ricerca: gruppi,
            riferimenti_esterni: String(rec.riferimenti_esterni || ''),
            allegati,
            link_polito: String(rec.link_polito || ''),
            is_new:     Boolean(rec.is_new),
            is_updated: Boolean(rec.is_updated),
        };
    }

    // ── Populate dropdowns ─────────────────────────────────────
    function populateSelects() {
        const tipi   = new Set();
        const gruppi = new Set();

        normalizedData.forEach(t => {
            if (t.tipo_tesi) tipi.add(t.tipo_tesi.toUpperCase());
            (t.gruppi_ricerca || []).forEach(g => {
                // Prendi solo la parte finale dopo " - " per brevità
                const short = g.split(' - ').pop().trim();
                if (short) gruppi.add(short);
            });
        });

        [...tipi].sort().forEach(v => fTipo.add(new Option(v, v)));
        [...gruppi].sort().forEach(v => fGruppo.add(new Option(v, v)));
    }

    // ── Card factory ───────────────────────────────────────────
    function buildCard(t) {
        const card = document.createElement('div');
        card.className = 'card' + (t.scaduta ? ' expired' : '');
        const favorite = isFavorite(t);

        const badges = [];
        if (t.is_new)    badges.push('<span class="badge badge-new">NEW</span>');
        if (t.is_updated)badges.push('<span class="badge badge-updated">UPDATED</span>');
        if (t.scaduta)   badges.push('<span class="badge badge-scaduta">Scaduta</span>');
        if (t.azienda)   badges.push('<span class="badge badge-azienda">Azienda</span>');
        if (t.estero)    badges.push('<span class="badge badge-estero">Estero</span>');
        if ((t.allegati || []).length) badges.push('<span class="badge badge-allegati" title="Questa tesi include link aggiuntivi (download o risorse esterne).">Link</span>');

        const relatoriHtml = (t.relatori || [])
            .map(r => `<li class="relatore-item">${esc(r)}</li>`).join('') ||
            `<li class="relatore-item" style="color:var(--text-muted)">${tr('noRelatore')}</li>`;

        const kwHtml = (t.keywords || [])
            .map(k => `<span class="keyword">${esc(k)}</span>`).join('');

        const hasAttachments = (t.allegati || []).length > 0;

        card.innerHTML = `
            <div class="card-header">
                <h3 class="card-title">${esc(t.titolo)}${hasAttachments ? '<span class="attachment-indicator" title="Questa tesi contiene link aggiuntivi.">&#128206;</span>' : ''}</h3>
                <div class="badges-top">
                    <button class="fav-btn ${favorite ? 'active' : ''}" title="${favorite ? tr('favRemove') : tr('favAdd')}" aria-label="Preferiti">${favorite ? '★' : '☆'}</button>
                    ${badges.join('')}
                </div>
            </div>
            <div class="relatori">
                <div class="relatori-title">${tr('relatori')}</div>
                <ul class="relatori-list">${relatoriHtml}</ul>
            </div>
            ${hasAttachments ? `<div class="attachment-hint">&#128206; ${currentLang === 'en' ? 'Additional links available' : 'Link aggiuntivi disponibili'}</div>` : ''}
            ${t.tipo_tesi ? `<div style="font-size:0.78rem;color:var(--text-muted)"><strong>${tr('tipo')}</strong> ${esc(t.tipo_tesi)}</div>` : ''}
            <div class="keywords">${kwHtml}</div>
        `;

        const favBtn = card.querySelector('.fav-btn');
        if (favBtn) {
            favBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite(t);
                renderGrid();
            });
        }

        card.addEventListener('click', () => openModal(t));
        return card;
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildProfessorEmail(fullName) {
        const raw = String(fullName || '').trim();
        if (!raw) return '';

        const normalized = raw
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^A-Za-z0-9\s']/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();

        if (!normalized) return '';

        const tokens = normalized
            .split(' ')
            .map(t => t.replace(/[^A-Za-z0-9]/g, '').toLowerCase())
            .filter(Boolean);

        if (tokens.length < 2) return '';

        const maybePortalOrder = raw === raw.toUpperCase();
        let namePart = '';
        let surnamePart = '';

        if (maybePortalOrder) {
            // Nei dati del portale compare spesso "COGNOME NOME" in maiuscolo.
            namePart = tokens[tokens.length - 1];
            surnamePart = tokens.slice(0, -1).join('');
        } else {
            namePart = tokens[0];
            surnamePart = tokens.slice(1).join('');
        }

        if (!namePart || !surnamePart) return '';
        return `${namePart}.${surnamePart}@polito.it`;
    }

    // ── Render ─────────────────────────────────────────────────
    function renderGrid() {
        const titleQ    = fTitle.value.toLowerCase();
        const relatoreQ = fRelatore.value.toLowerCase();
        const kwQuery   = fKeyword.value.toLowerCase().trim();
        const tipoFilter= fTipo.value.toUpperCase();
        const grpFilter = fGruppo.value;
        const expFilter = fScadenza.value;  // 'all' | 'active' | 'expired'
        const onlyAz    = fAzienda.checked;
        const onlyEs    = fEstero.checked;
        const onlyFavs  = fPreferiti.checked;
        const onlyNew     = fNew     ? fNew.checked     : false;
        const onlyUpdated = fUpdated ? fUpdated.checked : false;

        const data = normalizedData.filter(t => {
            if (titleQ && !t.titolo.toLowerCase().includes(titleQ)) return false;
            if (relatoreQ) {
                const ok = (t.relatori || []).some(r => r.toLowerCase().includes(relatoreQ));
                if (!ok) return false;
            }
            if (kwQuery) {
                const ok = (t.keywords || []).some(k => k.toLowerCase().includes(kwQuery));
                if (!ok) return false;
            }
            if (tipoFilter && (t.tipo_tesi || '').toUpperCase() !== tipoFilter) return false;
            if (grpFilter) {
                const ok = (t.gruppi_ricerca || []).some(g => g.split(' - ').pop().trim() === grpFilter);
                if (!ok) return false;
            }
            if (expFilter === 'active'  &&  t.scaduta) return false;
            if (expFilter === 'expired' && !t.scaduta) return false;
            if (onlyAz && !t.azienda) return false;
            if (onlyEs && !t.estero)  return false;
            if (onlyNew     && !t.is_new)     return false;
            if (onlyUpdated && !t.is_updated) return false;
            return true;
        });

        const favoriteData = data.filter(t => isFavorite(t));
        const visibleData = onlyFavs ? favoriteData : data;

        favoritesGrid.innerHTML = '';
        favoritesSection.classList.toggle('hidden', favoriteData.length === 0);
        favoriteData.forEach((t, i) => {
            const c = buildCard(t);
            c.style.animationDelay = `${Math.min(i * 0.03, 0.4)}s`;
            favoritesGrid.appendChild(c);
        });

        grid.innerHTML = '';
        if (visibleData.length === 0) {
            grid.innerHTML = `<div class="no-results">${onlyFavs ? tr('noFavs') : tr('noResults')}</div>`;
        } else {
            visibleData.forEach((tesi, i) => {
                const c = buildCard(tesi);
                c.style.animationDelay = `${Math.min(i * 0.04, 0.5)}s`;
                grid.appendChild(c);
            });
        }
        const statsResultsFn = tr('statsResults');
        const statsFavsFn    = tr('statsFavs');
        statsCounter.textContent = onlyFavs
            ? statsFavsFn(visibleData.length, data.length, normalizedData.length)
            : statsResultsFn(data.length, normalizedData.length, favoriteData.length);
    }


    // ── Modal ──────────────────────────────────────────────────
    function openModal(th) {
        modalTitle.textContent = th.titolo;

        const badges = [];
        if (th.is_new)    badges.push('<span class="badge badge-new">NEW</span>');
        if (th.is_updated)badges.push('<span class="badge badge-updated">UPDATED</span>');
        if (th.scaduta) badges.push('<span class="badge badge-scaduta">Scaduta</span>');
        if (th.azienda) badges.push('<span class="badge badge-azienda">Azienda</span>');
        if (th.estero)  badges.push('<span class="badge badge-estero">Estero</span>');
        if ((th.allegati || []).length) badges.push('<span class="badge badge-allegati" title="Sono presenti link aggiuntivi (download o esterni).">Link</span>');
        modalBadges.innerHTML = badges.join('');

        if (th.link_polito) {
            modalLink.href = th.link_polito;
            modalLink.style.display = 'inline-block';
        } else {
            modalLink.style.display = 'none';
        }

        const relHtml = (th.relatori || [])
            .map(r => {
                const email = buildProfessorEmail(r);
                if (!email) return `<li class="relatore-item">${esc(r)}</li>`;
                return `<li class="relatore-item"><a class="relatore-link" href="mailto:${email}" title="Scrivi a ${esc(email)}">${esc(r)}</a></li>`;
            }).join('') ||
            `<li class="relatore-item" style="color:var(--text-muted)">${tr('noRelatore')}</li>`;

        const kwHtml = (th.keywords || [])
            .map(k => `<span class="keyword">${esc(k)}</span>`).join('');

        const attachmentEntries = (th.allegati || []);
        const hasDownloadLinks = attachmentEntries.some(a => /download_alleg/i.test(String(a.url || '')));
        const attachmentsHtml = attachmentEntries
            .map(a => {
                const url = String(a.url || '');
                const isDownload = /download_alleg/i.test(url);
                const title = isDownload
                    ? tr('linkDownload')
                    : tr('linkEsterno');
                const icon = isDownload ? '&#128206;' : '&#128279;';
                return `<li><a class="attachment-link" href="${esc(url)}" target="_blank" rel="noopener" title="${title}">${icon} ${esc(a.label)}</a></li>`;
            })
            .join('');

        const grpText = (t.gruppi_ricerca || []).join('\n') || '';

        modalBody.innerHTML = `
            <div class="detail-grid">
                <div class="detail-section">
                    <div class="detail-label">Tipo tesi</div>
                    <div class="detail-value">${esc(t.tipo_tesi || '—')}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Scadenza</div>
                    <div class="detail-value" style="${t.scaduta ? 'color:#f87171' : ''}">${esc(t.scadenza || '—')}</div>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-title">Relatori</div>
                <ul class="relatori-list">${relHtml}</ul>
                <div class="detail-warning">Gli indirizzi email sono generati automaticamente dal nome e potrebbero non essere corretti. Verifica sempre l'indirizzo prima di inviare.</div>
            </div>

            ${th.descrizione ? `
            <div class="detail-section">
                <div class="detail-title">${tr('detDescrizione')}</div>
                <div class="detail-content">${esc(th.descrizione)}</div>
            </div>` : ''}

            ${th.competenze_richieste ? `
            <div class="detail-section">
                <div class="detail-title">${tr('detCompetenze')}</div>
                <div class="detail-content">${esc(th.competenze_richieste)}</div>
            </div>` : ''}

            ${grpText ? `
            <div class="detail-section">
                <div class="detail-title">${tr('detGruppi')}</div>
                <div class="detail-content">${esc(grpText)}</div>
            </div>` : ''}

            ${(attachmentsHtml || th.riferimenti_esterni) ? `
            <div class="detail-section">
                <div class="detail-title">${tr('detRiferimenti')}</div>
                ${attachmentsHtml ? `<ul class="attachments-list">${attachmentsHtml}</ul>` : ''}
                ${th.riferimenti_esterni ? `<div class="detail-content" style="margin-top:${attachmentsHtml ? '0.8rem' : '0'}">${esc(th.riferimenti_esterni)}</div>` : ''}
                ${attachmentsHtml && hasDownloadLinks ? `<div class="detail-warning" style="margin-top:0.7rem">${currentLang === 'en' ? "Some links are portal downloads and may require access to the Teaching Portal." : "Alcuni link sono download del portale e potrebbero richiedere l'accesso al Portale della Didattica."}</div>` : ''}
            </div>` : ''}

            ${kwHtml ? `
            <div class="detail-section">
                <div class="detail-title">${tr('detKeywords')}</div>
                <div class="keywords">${kwHtml}</div>
            </div>` : ''}
        `;

        document.body.style.overflow = 'hidden';
        modalOverlay.style.display = 'flex';
        requestAnimationFrame(() => modalOverlay.classList.add('visible'));
    }

    function closeModal() {
        modalOverlay.classList.remove('visible');
        setTimeout(() => { modalOverlay.style.display = 'none'; }, 250);
        document.body.style.overflow = '';
    }

    modalCloseBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Init ───────────────────────────────────────────────────
    [fTitle, fRelatore, fKeyword].forEach(el => el.addEventListener('input', renderGrid));
    [fTipo, fGruppo, fScadenza, fAzienda, fEstero, fPreferiti, fNew, fUpdated]
        .filter(Boolean).forEach(el => el.addEventListener('change', renderGrid));

    window.addEventListener('DOMContentLoaded', () => {
        applyLang();  // Apply i18n before rendering
        if (typeof tesiData === 'undefined' || !Array.isArray(tesiData) || !tesiData.length) {
            grid.innerHTML = `<div class="no-results" style="color:#ef4444;">${tr('noData')}</div>`;
            statsCounter.textContent = '';
            return;
        }

        normalizedData = tesiData.map(normalizeRecord).filter(t => t.titolo);
        if (!normalizedData.length) {
            grid.innerHTML = '<div class="no-results" style="color:#ef4444;">Errore: il formato dei dati non è valido.</div>';
            statsCounter.textContent = '';
            return;
        }

        loadFavorites();
        populateSelects();
        renderGrid();
    });
    </script>
</body>
</html>
